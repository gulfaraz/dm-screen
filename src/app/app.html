<ion-tabs>
    <ion-tab-bar
        class="ion-justify-content-start"
        slot="top"
        translucent="true"
    >
        <ion-tab-button class="dm-screen" href="/dm-screen">
            <ion-label class="ion-text-start">
                <h1 class="font-bold">DM Screen</h1>
                <ion-text class="font-normal">by Gulfaraz Rahman</ion-text>
            </ion-label>
        </ion-tab-button>
        <ion-tab-button tab="sound-board">
            <ion-label>{{ name['bgm'] }}</ion-label>
        </ion-tab-button>
        <ion-tab-button tab="alignment-tracker">
            <ion-label>{{ name['alignment-tracker'] }}</ion-label>
        </ion-tab-button>
        <ion-tab-button tab="scenes">
            <ion-label>{{ name['scenes'] }}</ion-label>
        </ion-tab-button>
        <ion-tab-button tab="rules">
            <ion-label>{{ name['rules'] }}</ion-label>
        </ion-tab-button>
        <ion-tab-button class="payment-link" [href]="paymentLink">
            <ion-label>Pay What You Want</ion-label>
        </ion-tab-button>
    </ion-tab-bar>
</ion-tabs>
