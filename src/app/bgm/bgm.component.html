<ion-content>
    <app-bgm-guide />
    <app-bgm-player
        [bgm]="bgm"
        [player]="player"
        [loading]="loading"
        [error]="error"
        [isPlaying]="isPlaying"
        (playbackEvent)="playbackEvent($event)"
        (volumeEvent)="volumeEvent($event)"
    />
    <ion-list lines="full">
        <ion-row>
            <ion-col class="ion-text-center">
                <youtube-player
                    [videoId]="getVideoId(bgm.link)"
                    [disableCookies]="true"
                    (stateChange)="debouncePlayerState($event.data)"
                    (ready)="playerReady($event)"
                    (error)="playerError()"
                    [playerVars]="{
                        loop: 1,
                        autoplay: 1,
                        playlist: getVideoId(bgm.link)
                    }"
                />
            </ion-col>
        </ion-row>
        <ion-accordion-group
            #accordionGroup
            [multiple]="true"
            [disabled]="loading"
        >
            @for (bgmSet of bgmSets; track bgmSet; let bgmSetIndex = $index) {
            <ion-accordion
                [value]="bgmSet.name"
                toggleIconSlot="start"
                toggleIcon="caret-down-circle"
            >
                <ion-item slot="header">
                    <ion-item lines="none" class="ion-margin-vertical">
                        <ion-input
                            class="ion-no-padding"
                            [placeholder]="
                                'Sound Group ' + (bgmSetIndex + 1) + ' Name'
                            "
                            [(ngModel)]="bgmSet.name"
                            (click)="$event.stopPropagation()"
                            (change)="save()"
                            name="name"
                            id="name"
                            label=""
                        />
                    </ion-item>
                    <app-bgm-buttons
                        slot="end"
                        [bgmSet]="bgmSet"
                        [disabled]="loading"
                        (togglePlaybackEvent)="togglePlayback($event)"
                    />
                </ion-item>
                <app-bgm-editor
                    slot="content"
                    [bgmSet]="bgmSet"
                    [bgmSetIndex]="bgmSetIndex"
                    (deleteBgmSetEvent)="deleteBgmSet($event)"
                    (changeEvent)="save()"
                />
            </ion-accordion>
            }
        </ion-accordion-group>
        <ion-row>
            <ion-col>
                <ion-item
                    class="ion-padding-vertical"
                    button
                    detail="false"
                    lines="none"
                    (click)="addBgmSet()"
                    [disabled]="loading"
                >
                    <ion-icon name="add" slot="start" />
                    <ion-label>Add Sound Group</ion-label>
                </ion-item>
            </ion-col>
            <ion-col size="3">
                <app-bgm-set-importer (importEvent)="import($event)" />
            </ion-col>
            <ion-col size="3">
                <app-bgm-set-exporter [storageKey]="storageKey" />
            </ion-col>
        </ion-row>
    </ion-list>
    <app-footer />
</ion-content>
